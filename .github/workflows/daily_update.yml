name: Daily HK Quant Scanner

on:
  schedule:
    # Runs at 16:30 HK Time (08:30 UTC) every weekday (Mon-Fri)
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run Scanner Script
        run: python main.py

      - name: Commit and Push changes (HTML & JSON)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html tracking_log.json
          git commit -m "Auto-update daily scan & log" || exit 0
          git push
